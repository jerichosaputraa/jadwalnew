<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta content='width=device-width, initial-scale=1' name='viewport'/>
    <title>Sticker Text Pro - Fixed Font Upload</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Luckiest+Guy&family=Lilita+One&family=Sour+Gummy:wght@900&family=Bungee&family=Quicksand:wght@700&display=swap' rel='stylesheet'/>
    <script src='https://unpkg.com/lucide@latest'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js'></script>

    <style>
        #sticker-app-container { font-family: 'Inter', sans-serif !important; max-width: 1280px; margin: 0 auto; background: #f3f4f6; padding: 20px; }
        .canvas-area { background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; border-radius: 24px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05); }
        .custom-file-upload { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; cursor: pointer; background: #f9fafb; border: 2px dashed #d1d5db; border-radius: 12px; transition: all 0.2s; min-height: 60px; }
        .custom-file-upload:hover { border-color: #3b82f6; background: #eff6ff; }
        .color-checkbox:checked + label { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); transform: scale(1.05); }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
        canvas { display: block; max-width: 100%; height: auto; }
    </style>
</head>
<body class="bg-gray-100">
    <div id='sticker-app-container'>
        <div class='text-center mb-8'>
            <h2 class='text-3xl font-black text-gray-800 flex items-center justify-center gap-2'>
                <i class='text-yellow-500' data-lucide='sticker'></i> Sticker Text Pro
            </h2>
        </div>

        <div class='grid grid-cols-1 lg:grid-cols-12 gap-6'>
            <div class='lg:col-span-4 xl:col-span-3 space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-gray-100'>
                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase'>Tulis Teks</label>
                    <input class='w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none font-bold' id='textInput' type='text' value='Jericho'/>
                </div>

                <div class='space-y-3'>
                    <div>
                        <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase'>Pilih Font</label>
                        <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl text-sm' id='fontFamily'>
                            <option value='Lilita One'>Lilita One</option>
                            <option value='Sour Gummy' selected>Sour Gummy</option>
                            <option value='Luckiest Guy'>Luckiest Guy</option>
                            <option value='Fredoka'>Fredoka</option>
                        </select>
                    </div>
                    <label class='custom-file-upload group' id='uploadContainer'>
                        <input accept='.ttf,.otf' class='hidden' id='fontUpload' type='file'/>
                        <div class='flex flex-col items-center gap-1 text-center' id='uploadLabel'>
                            <i class='text-blue-500' data-lucide='file-up'></i>
                            <span class='text-[9px] font-black text-gray-500 uppercase'>Upload Font (.ttf)</span>
                        </div>
                    </label>
                </div>

                <div class='grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100'>
                    <div class='space-y-2'>
                        <label class='text-[9px] font-black text-gray-400 uppercase'>Ukuran</label>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer' id='fontSize' max='200' min='10' step='1' type='range' value='30'/>
                    </div>
                    <div class='space-y-2'>
                        <label class='text-[9px] font-black text-gray-400 uppercase'>Outline</label>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer' id='strokeWidth' max='35' min='0' step='0.1' type='range' value='2'/>
                    </div>
                </div>

                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase'>Profil Warna</label>
                    <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl text-xs font-bold' id='colorProfile'>
                        <option value='vintage'>Vintage Soft</option>
                        <option value='playful'>Playful</option>
                        <option value='bold' selected>Bold</option>
                    </select>
                </div>

                <div class='grid grid-cols-5 gap-2' id='colorPalette'></div>
            </div>

            <div class='lg:col-span-8 xl:col-span-9 flex flex-col gap-4'>
                <div class='canvas-area flex-grow min-h-[450px] flex items-center justify-center relative bg-gray-50 border-4 border-white shadow-xl'>
                    <canvas id='textCanvas'></canvas>
                </div>
                <div class='bg-white p-4 rounded-2xl flex justify-between items-center gap-4 border border-gray-100'>
                    <p class='text-[10px] text-gray-400 font-mono italic' id='statusText'>Sistem siap.</p>
                    <div class='flex gap-2'>
                        <button class='bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black' id='downloadBtn'>SIMPAN PNG</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('textCanvas'), ctx = canvas.getContext('2d');
            const textInput = document.getElementById('textInput'), fontFamily = document.getElementById('fontFamily');
            const fontUpload = document.getElementById('fontUpload'), uploadLabel = document.getElementById('uploadLabel');
            const fontSize = document.getElementById('fontSize'), strokeWidth = document.getElementById('strokeWidth');
            const colorPaletteContainer = document.getElementById('colorPalette'), statusText = document.getElementById('statusText');
            
            const profiles = {
                bold: ['#df775b', '#749bb5', '#edba65', '#fccdba', '#e1863b'],
                playful: ['#ff0000', '#2baae2', '#3db54a', '#f79421'],
                vintage: ['#84a5ba', '#d87459', '#e9c465', '#f8c5af']
            };

            let charColors = [], currentPalette = [], currentOpentypeFont = null;

            function init() {
                initPalette('bold');
                lucide.createIcons();
                document.fonts.ready.then(() => draw());
            }

            // --- FITUR UPLOAD FONT (PERBAIKAN) ---
            fontUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                statusText.innerText = "Memproses font...";
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    try {
                        // 1. Simpan untuk Opentype (SVG/PDF) [cite: 138]
                        currentOpentypeFont = opentype.parse(event.target.result);
                        
                        // 2. Registrasi untuk Canvas (Preview) 
                        const fontName = 'CustomFont_' + Date.now();
                        const fontFace = new FontFace(fontName, event.target.result);
                        
                        fontFace.load().then(function(loadedFace) {
                            document.fonts.add(loadedFace);
                            
                            // Tambah ke dropdown & pilih 
                            const option = document.createElement('option');
                            option.value = fontName;
                            option.text = "Kustom: " + file.name;
                            fontFamily.add(option);
                            fontFamily.value = fontName;

                            // Update UI 
                            uploadLabel.innerHTML = `<i data-lucide="check-circle" class="text-green-500"></i><span class="text-green-600 font-black text-[9px] uppercase">Berhasil</span>`;
                            lucide.createIcons();
                            statusText.innerText = "Font berhasil diunggah.";
                            draw();
                        }).catch(err => {
                            statusText.innerText = "Gagal memuat font ke browser.";
                        });
                    } catch (err) {
                        statusText.innerText = "File bukan font yang valid.";
                    }
                };
                reader.readAsArrayBuffer(file);
            });

            function initPalette(key) {
                currentPalette = [...profiles[key]];
                colorPaletteContainer.innerHTML = '';
                currentPalette.forEach((color, i) => {
                    const wrapper = document.createElement('div');
                    wrapper.innerHTML = `<input type="checkbox" id="c-${i}" class="hidden color-checkbox" checked value="${color}"/>
                                         <label for="c-${i}" class="block w-full h-8 rounded-lg cursor-pointer border-2 border-white shadow-sm" style="background-color:${color}"></label>`;
                    colorPaletteContainer.appendChild(wrapper);
                    wrapper.querySelector('input').addEventListener('change', draw);
                });
                draw();
            }

            async function draw() {
                const text = textInput.value || " ";
                const size = parseFloat(fontSize.value);
                const sWidth = parseFloat(strokeWidth.value);
                const activeFont = fontFamily.value;

                // Hitung warna karakter
                const checkboxes = colorPaletteContainer.querySelectorAll('.color-checkbox:checked');
                const selected = Array.from(checkboxes).map(cb => cb.value);
                charColors = text.split('').map((_, i) => selected[i % selected.length] || '#000000');

                ctx.font = `900 ${size}px "${activeFont}", sans-serif`;
                const m = ctx.measureText(text);
                canvas.width = m.width + (size * 1.5);
                canvas.height = size * 3;
                
                ctx.font = `900 ${size}px "${activeFont}", sans-serif`;
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'center';
                ctx.lineJoin = 'round';
                
                const x = canvas.width / 2, y = canvas.height / 2;
                let tx = (canvas.width - m.width) / 2;

                // Draw Outline
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = sWidth * 2.5;
                let ox = tx;
                for (let i = 0; i < text.length; i++) {
                    const cw = ctx.measureText(text[i]).width;
                    ctx.strokeText(text[i], ox + cw/2, y); ox += cw;
                }

                // Draw Text
                let fx = tx;
                for (let i = 0; i < text.length; i++) {
                    const cw = ctx.measureText(text[i]).width;
                    ctx.fillStyle = charColors[i];
                    ctx.fillText(text[i], fx + cw/2, y); fx += cw;
                }
            }

            textInput.addEventListener('input', draw);
            fontFamily.addEventListener('change', draw);
            fontSize.addEventListener('input', draw);
            strokeWidth.addEventListener('input', draw);
            window.onload = init;
        })();
    </script>
</body>
</html>
