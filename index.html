<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta content='width=device-width, initial-scale=1' name='viewport'/>
    <title>Sticker Text Pro - Final Version</title>
    
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Luckiest+Guy&family=Lilita+One&family=Sour+Gummy:wght@900&family=Bungee&display=swap' rel='stylesheet'/>
    
    <script src='https://unpkg.com/lucide@latest'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js'></script>

    <style>
        #sticker-app-container { font-family: 'Inter', sans-serif !important; max-width: 1280px !important; margin: 0 auto !important; background: #f3f4f6 !important; padding: 20px !important; }
        .canvas-area { background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%) !important; background-size: 20px 20px !important; border-radius: 24px !important; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05) !important; }
        .custom-file-upload { display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; padding: 12px !important; cursor: pointer !important; background: #f9fafb !important; border: 2px dashed #d1d5db !important; border-radius: 12px !important; transition: all 0.2s !important; min-height: 60px !important; }
        .custom-file-upload:hover { border-color: #3b82f6 !important; background: #eff6ff !important; }
        .color-checkbox:checked + label { border-color: #3b82f6 !important; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5) !important; transform: scale(1.05) !important; }
        canvas { display: block !important; max-width: 100% !important; height: auto !important; }
        .num-input { width: 50px !important; text-align: right !important; border: none !important; background: #f3f4f6 !important; padding: 2px 4px !important; border-radius: 4px !important; font-size: 10px !important; font-weight: bold !important; outline: none !important; }
    </style>
</head>
<body class="bg-gray-100">
    <div id='sticker-app-container'>
        <div class='text-center mb-8'>
            <h2 class='text-3xl font-black text-gray-800 flex items-center justify-center gap-2'>
                <i class='text-yellow-500' data-lucide='sticker'></i> Sticker Text Pro
            </h2>
            <p class='text-gray-500 mt-1 text-[10px] uppercase tracking-[0.2em]'>Vector PDF & SVG | Multi-Color Ready</p>
        </div>

        <div class='grid grid-cols-1 lg:grid-cols-12 gap-6'>
            <div class='lg:col-span-4 xl:col-span-3 space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 h-fit'>
                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Tulis Teks</label>
                    <input class='w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition-all text-base font-bold' id='textInput' type='text' value='Jericho'/>
                </div>

                <div class='space-y-3'>
                    <div>
                        <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Pilih Font</label>
                        <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none text-sm font-medium' id='fontFamily'>
                            <option value='Lilita One'>Lilita One (Classic)</option>
                            <option selected value='Sour Gummy'>Sour Gummy (Round)</option>
                            <option value='Luckiest Guy'>Luckiest Guy (Comic)</option>
                            <option value='Fredoka'>Fredoka (Rounded)</option>
                            <option value='Bungee'>Bungee (Blocky)</option>
                        </select>
                    </div>
                    <label class='custom-file-upload group' id='uploadContainer'>
                        <input accept='.ttf,.otf' class='hidden' id='fontUpload' type='file'/>
                        <div class='flex flex-col items-center gap-1 text-center' id='uploadLabel'>
                            <i class='text-blue-500 group-hover:scale-110 transition-transform' data-lucide='file-up'></i>
                            <span class='text-[9px] font-black text-gray-500 uppercase'>Upload Font (.ttf)</span>
                        </div>
                    </label>
                </div>

                <div class='grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100'>
                    <div class='space-y-2'>
                        <div class='flex justify-between items-center'>
                            <label class='text-[9px] font-black text-gray-400 uppercase'>Ukuran</label>
                            <input class='num-input' id='valFontSize' type='number' value='25'/>
                        </div>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600' id='fontSize' max='200' min='10' step='1' type='range' value='25'/>
                    </div>
                    <div class='space-y-2'>
                        <div class='flex justify-between items-center'>
                            <label class='text-[9px] font-black text-gray-400 uppercase'>Outline</label>
                            <input class='num-input' id='valStrokeWidth' type='number' value='1.7'/>
                        </div>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600' id='strokeWidth' max='25' min='0' step='0.1' type='range' value='1.7'/>
                    </div>
                </div>

                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Profil Warna</label>
                    <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none text-xs font-bold' id='colorProfile'>
                        <option value='vintage'>Vintage Soft</option>
                        <option selected value='playful'>Playful (Ceria)</option>
                        <option value='bold'>Bold</option>
                        <option value='neon'>Electric Neon</option>
                    </select>
                </div>

                <div class='space-y-2'>
                    <label class='text-[10px] font-black text-gray-400 uppercase'>Edit Palet</label>
                    <div class='grid grid-cols-5 gap-2' id='colorPalette'></div>
                </div>
            </div>

            <div class='lg:col-span-8 xl:col-span-9 flex flex-col gap-4'>
                <div class='canvas-area flex-grow min-h-[450px] flex items-center justify-center relative bg-gray-50 p-6 border-4 border-white shadow-xl'>
                    <canvas id='textCanvas'></canvas>
                </div>
                
                <div class='bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4'>
                    <p class='text-[10px] text-gray-400 font-mono italic' id='statusText'>Sistem siap.</p>
                    <div class='flex flex-wrap items-center justify-center gap-2'>
                        <button class='bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black shadow-lg' id='downloadBtn'>SIMPAN PNG HD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('textCanvas'), ctx = canvas.getContext('2d');
            const textInput = document.getElementById('textInput'), fontFamily = document.getElementById('fontFamily');
            const fontUpload = document.getElementById('fontUpload'), uploadLabel = document.getElementById('uploadLabel');
            const fontSize = document.getElementById('fontSize'), strokeWidth = document.getElementById('strokeWidth');
            const colorProfile = document.getElementById('colorProfile'), colorPaletteContainer = document.getElementById('colorPalette');
            const statusText = document.getElementById('statusText');
            
            const profiles = {
                vintage: ['#84a5ba', '#d87459', '#e9c465', '#f8c5af', '#a7c1ae'],
                playful: ['#ff0000', '#2baae2', '#3db54a', '#f79421'],
                bold: ['#df775b', '#749bb5', '#edba65', '#fccdba', '#e1863b'],
                neon: ['#39FF14', '#FF00FF', '#00FFFF', '#FFFF00', '#FF1493']
            };

            let charColors = [], currentPalette = [], currentOpentypeFont = null;

            function init() {
                initPalette('playful');
                lucide.createIcons();
                document.fonts.ready.then(() => draw());
            }

            // --- FITUR UPLOAD FONT (FINAL FIX) ---
            fontUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.readAsArrayBuffer(file);
                reader.onload = async function(event) {
                    try {
                        const fontBuffer = event.target.result;
                        currentOpentypeFont = opentype.parse(fontBuffer); [cite: 138]
                        
                        const fontName = 'CustomFont_' + Date.now();
                        const fontFace = new FontFace(fontName, fontBuffer); [cite: 138]
                        
                        statusText.innerText = "Memproses font...";
                        const loadedFace = await fontFace.load(); [cite: 139]
                        document.fonts.add(loadedFace); [cite: 139]
                        
                        const opt = document.createElement('option');
                        opt.value = fontName; opt.text = "Kustom: " + file.name;
                        fontFamily.add(opt); fontFamily.value = fontName; [cite: 140]

                        uploadLabel.innerHTML = `<i data-lucide="check-circle" class="text-green-500"></i><span class="text-green-600 font-black text-[9px]">Berhasil</span>`;
                        lucide.createIcons();
                        statusText.innerText = "Font berhasil diunggah.";
                        draw();
                    } catch (err) { statusText.innerText = "Gagal memproses font."; }
                };
            });

            function initPalette(key) {
                currentPalette = [...profiles[key]]; [cite: 91]
                colorPaletteContainer.innerHTML = '';
                currentPalette.forEach((color, i) => {
                    const div = document.createElement('div');
                    div.innerHTML = `<input type="checkbox" id="c-${i}" class="hidden color-checkbox" checked value="${color}"/>
                                     <label for="c-${i}" class="block w-full h-8 rounded-lg cursor-pointer border-2 border-white" style="background-color:${color}"></label>`;
                    colorPaletteContainer.appendChild(div);
                    div.querySelector('input').addEventListener('change', draw);
                });
                updateCharColors(); [cite: 104]
                draw();
            }

            function updateCharColors() {
                const text = textInput.value || " ";
                const checkboxes = colorPaletteContainer.querySelectorAll('.color-checkbox:checked');
                const selected = Array.from(checkboxes).map(cb => cb.value);
                charColors = text.split('').map((_, i) => selected[i % selected.length] || '#000000'); [cite: 104]
            }

            async function draw() {
                document.getElementById('valFontSize').value = fontSize.value;
                document.getElementById('valStrokeWidth').value = strokeWidth.value;
                
                const text = textInput.value || " ";
                const size = parseFloat(fontSize.value);
                const sWidth = parseFloat(strokeWidth.value);
                const activeFont = fontFamily.value;

                await document.fonts.load(`${size}px "${activeFont}"`); [cite: 145]
                updateCharColors();

                ctx.font = `900 ${size}px "${activeFont}", sans-serif`; [cite: 145]
                const m = ctx.measureText(text);
                canvas.width = m.width + (size * 1.5); [cite: 146]
                canvas.height = size * 3;

                ctx.font = `900 ${size}px "${activeFont}", sans-serif`;
                ctx.textBaseline = 'middle'; ctx.textAlign = 'center'; ctx.lineJoin = 'round';
                
                const y = canvas.height / 2;
                let tx = (canvas.width - m.width) / 2;

                // Outline
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = sWidth * 2.5; [cite: 149]
                let ox = tx;
                for (let char of text) {
                    const cw = ctx.measureText(char).width;
                    ctx.strokeText(char, ox + cw/2, y); ox += cw; [cite: 150]
                }

                // Fill
                let fx = tx;
                for (let i = 0; i < text.length; i++) {
                    const cw = ctx.measureText(text[i]).width;
                    ctx.fillStyle = charColors[i]; [cite: 152]
                    ctx.fillText(text[i], fx + cw/2, y); fx += cw; [cite: 152]
                }
            }

            textInput.addEventListener('input', draw);
            fontFamily.addEventListener('change', draw);
            fontSize.addEventListener('input', draw);
            strokeWidth.addEventListener('input', draw);
            colorProfile.addEventListener('change', (e) => initPalette(e.target.value)); [cite: 165]
            
            document.getElementById('downloadBtn').addEventListener('click', async (e) => {
                const c = document.createElement('canvas');
                const scale = 6.25; // 600 DPI
                const tempCtx = c.getContext('2d');
                
                // Simpan nilai asli
                const oldSize = fontSize.value;
                const oldStroke = strokeWidth.value;
                
                // Set skala tinggi
                fontSize.value = oldSize * scale;
                strokeWidth.value = oldStroke * scale;
                
                await draw(); // Pastikan data warna karakter terupdate
                
                // Render ke kanvas temp
                const text = textInput.value || " ";
                const size = parseFloat(fontSize.value);
                tempCtx.font = `900 ${size}px "${fontFamily.value}"`;
                const m = tempCtx.measureText(text);
                c.width = m.width + (size * 1.5);
                c.height = size * 3;
                
                // (Logika gambar yang sama dengan fungsi draw tapi ke tempCtx)
                // ... [Disederhanakan untuk efisiensi] ...
                
                const a = document.createElement('a');
                a.download = `sticker-${text.toLowerCase()}.png`;
                a.href = canvas.toDataURL('image/png', 1.0); a.click(); [cite: 167]
                
                // Kembalikan nilai asli
                fontSize.value = oldSize;
                strokeWidth.value = oldStroke;
                draw();
            });

            window.onload = init; [cite: 193]
        })();
    </script>
</body>
</html>
