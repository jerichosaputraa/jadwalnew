<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta content='width=device-width, initial-scale=1' name='viewport'/>
    <title>Sticker Text Pro - Final Stable</title>
    
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Luckiest+Guy&family=Lilita+One&family=Sour+Gummy:wght@900&family=Bungee&display=swap' rel='stylesheet'/>
    
    <script src='https://unpkg.com/lucide@latest'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js'></script>

    <style>
        #sticker-app-container { font-family: 'Inter', sans-serif !important; max-width: 1200px !important; margin: 0 auto !important; background: #f3f4f6 !important; padding: 20px !important; }
        .canvas-area { background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%) !important; background-size: 20px 20px !important; border-radius: 24px !important; min-height: 400px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05) !important; }
        canvas { display: block !important; max-width: 95% !important; height: auto !important; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .custom-file-upload { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; cursor: pointer; background: #f9fafb; border: 2px dashed #d1d5db; border-radius: 12px; transition: 0.2s; }
        .custom-file-upload:hover { border-color: #3b82f6; background: #eff6ff; }
        .num-input { width: 45px; text-align: right; border: none; background: #f3f4f6; padding: 2px 4px; border-radius: 4px; font-size: 10px; font-weight: bold; outline: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div id='sticker-app-container'>
        <div class='text-center mb-8'>
            <h2 class='text-3xl font-black text-gray-800 flex items-center justify-center gap-2'>
                <i class='text-yellow-500' data-lucide='sticker'></i> Sticker Text Pro
            </h2>
        </div>

        <div class='grid grid-cols-1 lg:grid-cols-12 gap-6'>
            <div class='lg:col-span-4 xl:col-span-3 space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 h-fit'>
                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Tulis Teks [cite: 36]</label>
                    <input class='w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none font-bold' id='textInput' type='text' value='Jericho'/>
                </div>

                <div class='space-y-3'>
                    <div>
                        <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Pilih Font [cite: 37]</label>
                        <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl text-sm font-medium' id='fontFamily'>
                            <option value='Sour Gummy' selected>Sour Gummy</option>
                            <option value='Lilita One'>Lilita One</option>
                            <option value='Luckiest Guy'>Luckiest Guy</option>
                            <option value='Bungee'>Bungee</option>
                        </select>
                    </div>
                    <label class='custom-file-upload group' id='uploadContainer'>
                        <input accept='.ttf,.otf' class='hidden' id='fontUpload' type='file'/> [cite: 41]
                        <div class='flex flex-col items-center gap-1 text-center' id='uploadLabel'>
                            <i class='text-blue-500' data-lucide='file-up'></i>
                            <span class='text-[9px] font-black text-gray-500 uppercase'>Upload Font [cite: 42]</span>
                        </div>
                    </label>
                </div>

                <div class='grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100'>
                    <div class='space-y-2'>
                        <div class='flex justify-between items-center'>
                            <label class='text-[9px] font-black text-gray-400 uppercase'>Ukuran</label>
                            <input class='num-input' id='valFontSize' type='number' value='35'/>
                        </div>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600' id='fontSize' max='200' min='10' step='1' type='range' value='35'/> [cite: 45]
                    </div>
                    <div class='space-y-2'>
                        <div class='flex justify-between items-center'>
                            <label class='text-[9px] font-black text-gray-400 uppercase'>Outline</label>
                            <input class='num-input' id='valStrokeWidth' type='number' value='1.7'/>
                        </div>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600' id='strokeWidth' max='25' min='0' step='0.1' type='range' value='1.7'/> [cite: 48]
                    </div>
                </div>

                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Profil Warna [cite: 51]</label>
                    <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl text-xs font-bold' id='colorProfile'>
                        <option value='playful' selected>Playful (Ceria)</option>
                        <option value='vintage'>Vintage Soft</option>
                        <option value='bold'>Bold</option>
                    </select>
                </div>
                
                <div id="colorPalette" class="grid grid-cols-5 gap-2"></div> [cite: 59]
            </div>

            <div class='lg:col-span-8 xl:col-span-9 flex flex-col gap-4'>
                <div class='canvas-area bg-gray-50 border-4 border-white shadow-xl overflow-hidden' id="canvasContainer">
                    <canvas id='textCanvas'></canvas> [cite: 68]
                </div>
                
                <div class='bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center'>
                    <p class='text-[10px] text-gray-400 font-mono italic' id='statusText'>Sistem siap [cite: 71]</p>
                    <button class='bg-blue-600 text-white px-8 py-3 rounded-xl font-black shadow-lg hover:bg-blue-700 transition-all' id='downloadBtn'>SIMPAN PNG [cite: 74]</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('textCanvas'), ctx = canvas.getContext('2d');
            const textInput = document.getElementById('textInput'), fontFamily = document.getElementById('fontFamily');
            const fontSize = document.getElementById('fontSize'), strokeWidth = document.getElementById('strokeWidth');
            const colorPaletteContainer = document.getElementById('colorPalette'), statusText = document.getElementById('statusText');
            const fontUpload = document.getElementById('fontUpload'), uploadLabel = document.getElementById('uploadLabel');
            
            const profiles = {
                playful: ['#ff0000', '#2baae2', '#3db54a', '#f79421'],
                vintage: ['#84a5ba', '#d87459', '#e9c465', '#f8c5af', '#a7c1ae'],
                bold: ['#df775b', '#749bb5', '#edba65', '#fccdba', '#e1863b']
            };

            let currentPalette = [], charColors = [];

            function init() {
                initPalette('playful');
                lucide.createIcons();
                // Tunggu font Google dimuat sebelum menggambar pertama kali
                document.fonts.ready.then(() => draw());
            }

            // Fitur Upload Font
            fontUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.readAsArrayBuffer(file);
                reader.onload = async function(event) {
                    try {
                        const fontName = 'CustomFont_' + Date.now();
                        const fontFace = new FontFace(fontName, event.target.result);
                        statusText.innerText = "Memuat font...";
                        const loadedFace = await fontFace.load();
                        document.fonts.add(loadedFace);
                        
                        const opt = document.createElement('option');
                        opt.value = fontName; opt.text = "Kustom: " + file.name;
                        fontFamily.add(opt); fontFamily.value = fontName;

                        uploadLabel.innerHTML = `<i data-lucide="check-circle" class="text-green-500"></i><span class="text-green-600 font-black text-[9px]">Berhasil</span>`;
                        lucide.createIcons();
                        draw();
                    } catch (err) { statusText.innerText = "Error: File font rusak."; }
                };
            });

            function initPalette(key) {
                currentPalette = [...profiles[key]];
                colorPaletteContainer.innerHTML = '';
                currentPalette.forEach((color, i) => {
                    const div = document.createElement('div');
                    div.innerHTML = `<input type="checkbox" id="c-${i}" class="hidden color-checkbox" checked value="${color}"/>
                                     <label for="c-${i}" class="block w-full h-8 rounded-lg cursor-pointer border-2 border-white shadow-sm" style="background-color:${color}"></label>`;
                    colorPaletteContainer.appendChild(div);
                    div.querySelector('input').addEventListener('change', draw);
                });
                draw();
            }

            async function draw() {
                const text = textInput.value || " ";
                const size = parseFloat(fontSize.value);
                const sWidth = parseFloat(strokeWidth.value);
                const activeFont = fontFamily.value;

                // Update input angka
                document.getElementById('valFontSize').value = size;
                document.getElementById('valStrokeWidth').value = sWidth;

                // Tunggu font siap
                await document.fonts.load(`${size}px "${activeFont}"`);

                // Pengaturan Warna
                const checked = Array.from(colorPaletteContainer.querySelectorAll('.color-checkbox:checked')).map(cb => cb.value);
                const colors = checked.length > 0 ? checked : ['#000000'];

                ctx.font = `900 ${size}px "${activeFont}", sans-serif`;
                const m = ctx.measureText(text);
                
                // Atur ukuran kanvas secara dinamis agar teks tidak terpotong
                canvas.width = Math.max(m.width + (size * 1.5), 100);
                canvas.height = size * 3;

                ctx.font = `900 ${size}px "${activeFont}", sans-serif`;
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'center';
                ctx.lineJoin = 'round';
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                let currentX = (canvas.width - m.width) / 2;

                // 1. Gambar Outline Putih (Background)
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = sWidth * 2.5;
                let ox = currentX;
                for (let char of text) {
                    const cw = ctx.measureText(char).width;
                    ctx.strokeText(char, ox + cw/2, centerY);
                    ox += cw;
                }

                // 2. Gambar Isi Teks Berwarna
                let fx = currentX;
                for (let i = 0; i < text.length; i++) {
                    const cw = ctx.measureText(text[i]).width;
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.fillText(text[i], fx + cw/2, centerY);
                    fx += cw;
                }
                
                statusText.innerText = "Sistem siap.";
            }

            // Listeners
            textInput.addEventListener('input', draw);
            fontFamily.addEventListener('change', draw);
            fontSize.addEventListener('input', draw);
            strokeWidth.addEventListener('input', draw);
            document.getElementById('colorProfile').addEventListener('change', (e) => initPalette(e.target.value));

            document.getElementById('downloadBtn').addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = `sticker-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            });

            window.onload = init;
        })();
    </script>
</body>
</html>
