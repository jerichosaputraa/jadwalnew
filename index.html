<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta content='width=device-width, initial-scale=1' name='viewport'/>
    <title>Sticker Text Generator - Pro</title>
    
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Luckiest+Guy&family=Lilita+One&family=Sour+Gummy:wght@900&family=Bungee&family=Quicksand:wght@700&display=swap' rel='stylesheet'/>
    
    <script src='https://unpkg.com/lucide@latest'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js'></script>

    <style>
        #sticker-app-container { font-family: 'Inter', sans-serif !important; line-height: 1.2 !important; color: #1f2937 !important; max-width: 1280px !important; margin: 0 auto !important; background: #f3f4f6 !important; padding: 20px !important; }
        #sticker-app-container * { box-sizing: border-box !important; }
        .canvas-area { background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%) !important; background-size: 20px 20px !important; background-position: 0 0, 0 10px, 10px -10px, -10px 0px !important; border-radius: 24px !important; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05) !important; }
        .custom-file-upload { display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; padding: 12px !important; cursor: pointer !important; background: #f9fafb !important; border: 2px dashed #d1d5db !important; border-radius: 12px !important; transition: all 0.2s !important; min-height: 60px !important; }
        .custom-file-upload:hover { border-color: #3b82f6 !important; background: #eff6ff !important; }
        .color-checkbox:checked + label { border-color: #3b82f6 !important; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5) !important; transform: scale(1.05) !important; }
        .switch { position: relative !important; display: inline-block !important; width: 40px !important; height: 20px !important; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute !important; cursor: pointer !important; top: 0; left: 0; right: 0; bottom: 0 !important; background-color: #ccc !important; transition: .4s !important; border-radius: 20px !important; }
        .slider:before { position: absolute !important; content: "" !important; height: 14px !important; width: 14px !important; left: 3px !important; bottom: 3px !important; background-color: white !important; transition: .4s !important; border-radius: 50% !important; }
        input:checked + .slider { background-color: #3b82f6 !important; }
        input:checked + .slider:before { transform: translateX(20px) !important; }
        .loading-btn { pointer-events: none; opacity: 0.7; position: relative; }
        .loading-btn::after { content: ""; position: absolute; width: 16px; height: 16px; top: 50%; left: 10px; margin-top: -8px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .num-input { width: 50px !important; text-align: right !important; border: none !important; background: #f3f4f6 !important; padding: 2px 4px !important; border-radius: 4px !important; font-size: 10px !important; font-weight: bold !important; outline: none !important; }
        #savedProfilesList::-webkit-scrollbar { width: 4px; }
        #savedProfilesList::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        canvas { display: block !important; max-width: 100% !important; height: auto !important; }
        .palette-item .remove-color { display: none; z-index: 10; }
        .palette-item:hover .remove-color { display: flex; }
    </style>
</head>
<body class="bg-gray-100">
    <div id='sticker-app-container'>
        <div class='text-center mb-8'>
            <h2 class='text-3xl md:text-4xl font-black text-gray-800 flex items-center justify-center gap-2'>
                <i class='text-yellow-500' data-lucide='sticker' style='width:32px;height:32px;'></i> Sticker Text Pro
            </h2>
            <p class='text-gray-500 mt-1 text-[10px] md:text-xs font-bold uppercase tracking-[0.2em]'>Vector PDF & SVG | Outlines & Multi-Color Ready</p>
        </div>

        <div class='grid grid-cols-1 lg:grid-cols-12 gap-6'>
            <div class='lg:col-span-4 xl:col-span-3 space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 h-fit'>
                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Tulis Teks</label>
                    <input class='w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none text-base font-bold' id='textInput' type='text' value='Eriska'/>
                </div>

                <div class='space-y-3'>
                    <div>
                        <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Pilih Font</label>
                        <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl text-sm font-medium' id='fontFamily'>
                            <option selected value='Lilita One'>Lilita One (Classic)</option>
                            <option value='Sour Gummy'>Sour Gummy (Round)</option>
                            <option value='Luckiest Guy'>Luckiest Guy (Comic)</option>
                            <option value='Fredoka'>Fredoka (Rounded)</option>
                            <option value='Bungee'>Bungee (Blocky)</option>
                        </select>
                    </div>
                    <label class='custom-file-upload group'>
                        <input accept='.ttf,.otf' class='hidden' id='fontUpload' type='file'/>
                        <div class='flex flex-col items-center gap-1 text-center' id='uploadLabel'>
                            <i class='text-blue-500' data-lucide='file-up' style='width:20px;height:20px;'></i>
                            <span class='text-[9px] font-black text-gray-500 uppercase'>Upload Font (.ttf)</span>
                        </div>
                    </label>
                </div>

                <div class='grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100'>
                    <div class='space-y-2'>
                        <div class='flex justify-between items-center'>
                            <label class='text-[9px] font-black text-gray-400 uppercase'>Ukuran</label>
                            <input class='num-input' id='valFontSize' max='500' min='2' step='0.1' type='number' value='20'/>
                        </div>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer' id='fontSize' max='200' min='2' step='0.1' type='range' value='20'/>
                    </div>
                    <div class='space-y-2'>
                        <div class='flex justify-between items-center'>
                            <div class='flex items-center gap-1'>
                                <input checked class='w-3 h-3 accent-blue-600' id='outlineEnable' type='checkbox'/>
                                <label class='text-[9px] font-black text-gray-400 uppercase cursor-pointer' for='outlineEnable'>Outline</label>
                            </div>
                            <input class='num-input' id='valStrokeWidth' max='100' min='0' step='0.1' type='number' value='1.7'/>
                        </div>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer' id='strokeWidth' max='35' min='0' step='0.1' type='range' value='1.7'/>
                    </div>
                </div>

                <div class='flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100'>
                    <div class='flex items-center gap-2'>
                        <i class='text-gray-500' data-lucide='pencil-line' style='width:16px;height:16px;'></i>
                        <span class='text-[10px] font-black text-gray-700 uppercase'>Warna Outline</span>
                    </div>
                    <input class='w-6 h-6 rounded-md cursor-pointer' id='outlineColor' type='color' value='#ffffff'/>
                </div>

                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Profil Warna</label>
                    <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl text-xs font-bold' id='colorProfile'>
                        <option value='vintage'>Vintage Soft</option>
                        <option selected value='playful'>Playful (Ceria)</option>
                        <option value='bold'>Bold</option>
                        <option value='neon'>Electric Neon</option>
                        <option value='solid'>Solid Colors</option>
                    </select>
                </div>

                <div class='flex items-center justify-between bg-blue-50/50 p-3 rounded-xl border border-blue-100'>
                    <div class='flex items-center gap-2'>
                        <i class='text-blue-500' data-lucide='palette' style='width:16px;height:16px;'></i>
                        <span class='text-[10px] font-black text-blue-700 uppercase'>Mode Satu Warna</span>
                    </div>
                    <label class='switch'>
                        <input id='singleColorMode' type='checkbox'/>
                        <span class='slider'></span>
                    </label>
                </div>

                <div class='space-y-2'>
                    <div class='flex justify-between items-end'>
                        <label class='text-[10px] font-black text-gray-400 uppercase'>Edit Palet</label>
                        <div class='flex items-center gap-2'>
                            <button class='text-[9px] font-bold text-red-500 hover:underline' id='resetPaletteBtn'>RESET</button>
                            <input class='w-4 h-4 rounded-full cursor-pointer' id='customColorInput' type='color' value='#3b82f6'/>
                        </div>
                    </div>
                    <div class='grid grid-cols-5 gap-2' id='colorPalette'></div>
                </div>
            </div>

            <div class='lg:col-span-8 xl:col-span-9 flex flex-col gap-4'>
                <div class='canvas-area flex-grow min-h-[400px] flex items-center justify-center relative bg-gray-50 border-4 border-white shadow-xl'>
                    <canvas class='drop-shadow-2xl' id='textCanvas'></canvas>
                </div>
                <div class='bg-white p-4 rounded-2xl flex flex-wrap justify-between items-center gap-4 border border-gray-100'>
                    <p class='text-[10px] text-gray-400 font-mono italic' id='statusText'>Sistem siap.</p>
                    <div class='flex gap-2'>
                        <button class='bg-emerald-600 text-white px-4 py-2.5 rounded-xl font-black text-[11px]' id='downloadSvgBtn'>SVG</button>
                        <button class='bg-rose-600 text-white px-4 py-2.5 rounded-xl font-black text-[11px]' id='downloadPdfBtn'>PDF</button>
                        <button class='bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black' id='downloadBtn'>PNG 600 DPI</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('textCanvas'), ctx = canvas.getContext('2d');
            const textInput = document.getElementById('textInput'), fontFamily = document.getElementById('fontFamily');
            const fontSize = document.getElementById('fontSize'), strokeWidth = document.getElementById('strokeWidth');
            const outlineEnable = document.getElementById('outlineEnable'), outlineColor = document.getElementById('outlineColor');
            const colorProfile = document.getElementById('colorProfile'), colorPaletteContainer = document.getElementById('colorPalette');
            const singleColorMode = document.getElementById('singleColorMode'), statusText = document.getElementById('statusText');
            
            const profiles = {
                vintage: ['#84a5ba', '#d87459', '#e9c465', '#f8c5af', '#a7c1ae', '#84a5ba'],
                playful: ['#ff0000', '#2baae2', '#3db54a', '#f79421'],
                bold: ['#df775b', '#749bb5', '#edba65', '#fccdba', '#e1863b', '#b7ccbb'],
                neon: ['#39FF14', '#FF00FF', '#00FFFF', '#FFFF00', '#FF0000'],
                solid: ['#FF0000', '#0000FF', '#008000', '#FFFF00', '#FFA500']
            };

            let charColors = [], currentPalette = [], currentSelectedColors = [], currentOpentypeFont = null;

            function init() {
                initPalette('playful');
                lucide.createIcons();
                document.fonts.ready.then(() => draw());
            }

            function initPalette(profileKey) {
                currentPalette = [...profiles[profileKey]];
                renderPalette();
            }

            function renderPalette() {
                colorPaletteContainer.innerHTML = '';
                currentPalette.forEach((color, i) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'relative palette-item';
                    wrapper.innerHTML = `
                        <input type="checkbox" id="c-${i}" class="hidden color-checkbox" checked value="${color}"/>
                        <label for="c-${i}" class="block w-full h-8 rounded-lg cursor-pointer border-2 border-white shadow-sm" style="background-color:${color}"></label>
                    `;
                    colorPaletteContainer.appendChild(wrapper);
                    wrapper.querySelector('input').addEventListener('change', () => { updateSelectedColors(); draw(); });
                });
                updateSelectedColors();
            }

            function updateSelectedColors() {
                const checkboxes = colorPaletteContainer.querySelectorAll('.color-checkbox:checked');
                currentSelectedColors = Array.from(checkboxes).map(cb => cb.value);
                if (currentSelectedColors.length === 0) currentSelectedColors = [currentPalette[0] || '#000000'];
                updateCharColors();
            }

            function updateCharColors() {
                const text = textInput.value || " ";
                charColors = [];
                for (let i = 0; i < text.length; i++) {
                    charColors.push(singleColorMode.checked ? currentSelectedColors[0] : currentSelectedColors[i % currentSelectedColors.length]);
                }
            }

            async function renderToCanvas(targetCanvas, targetCtx, scale = 1) {
                const text = textInput.value || " ";
                const size = parseFloat(fontSize.value) * scale;
                const sWidth = parseFloat(strokeWidth.value) * scale;
                const fontSpec = `900 ${size}px "${fontFamily.value}", sans-serif`;
                
                await document.fonts.load(fontSpec);
                targetCtx.font = fontSpec;
                const m = targetCtx.measureText(text);
                targetCanvas.width = m.width + (size * 1.5);
                targetCanvas.height = size * 3;
                
                targetCtx.font = fontSpec;
                targetCtx.textBaseline = 'middle';
                targetCtx.textAlign = 'center';
                targetCtx.lineJoin = 'round';
                
                const x = targetCanvas.width / 2, y = targetCanvas.height / 2;
                let curX = (targetCanvas.width - m.width) / 2;

                if (outlineEnable.checked) {
                    targetCtx.strokeStyle = outlineColor.value;
                    targetCtx.lineWidth = sWidth * 2.5;
                    let tx = curX;
                    for (let i = 0; i < text.length; i++) {
                        const cw = targetCtx.measureText(text[i]).width;
                        targetCtx.strokeText(text[i], tx + cw/2, y); tx += cw;
                    }
                }
                
                let tx = curX;
                for (let i = 0; i < text.length; i++) {
                    const cw = targetCtx.measureText(text[i]).width;
                    targetCtx.fillStyle = charColors[i] || '#000000';
                    targetCtx.fillText(text[i], tx + cw/2, y); tx += cw;
                }
            }

            async function draw() { 
                document.getElementById('valFontSize').value = fontSize.value;
                document.getElementById('valStrokeWidth').value = strokeWidth.value;
                await renderToCanvas(canvas, ctx, 1); 
            }

            textInput.addEventListener('input', () => { updateCharColors(); draw(); });
            fontFamily.addEventListener('change', draw);
            fontSize.addEventListener('input', draw);
            strokeWidth.addEventListener('input', draw);
            outlineEnable.addEventListener('change', draw);
            outlineColor.addEventListener('input', draw);
            colorProfile.addEventListener('change', (e) => { initPalette(e.target.value); draw(); });
            singleColorMode.addEventListener('change', () => { updateCharColors(); draw(); });

            document.getElementById('downloadBtn').addEventListener('click', async (e) => {
                e.target.classList.add('loading-btn');
                const c = document.createElement('canvas');
                await renderToCanvas(c, c.getContext('2d'), 6.25);
                const a = document.createElement('a');
                a.download = `sticker-${Date.now()}.png`;
                a.href = c.toDataURL('image/png'); a.click();
                e.target.classList.remove('loading-btn');
            });

            window.onload = init;
        })();
    </script>
</body>
</html>
