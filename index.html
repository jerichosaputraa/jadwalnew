<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta content='width=device-width, initial-scale=1' name='viewport'/>
    <title>Sticker Text Generator - Pro</title>
    
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Luckiest+Guy&family=Lilita+One&family=Sour+Gummy:wght@900&family=Bungee&family=Quicksand:wght@700&display=swap' rel='stylesheet'/>
    
    <script src='https://unpkg.com/lucide@latest'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Quicksand', sans-serif; }
        #sticker-app-container { max-width: 1280px; margin: 0 auto; padding: 20px; }
        .canvas-area { 
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            border-radius: 24px;
        }
        .custom-file-upload { cursor: pointer; transition: all 0.2s; border: 2px dashed #d1d5db; border-radius: 12px; background: #fff; }
        .custom-file-upload:hover { border-color: #3b82f6; background: #eff6ff; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
        .num-input { width: 55px; text-align: right; background: #f3f4f6; padding: 2px 4px; border-radius: 4px; font-size: 11px; font-weight: bold; outline: none; }
        .color-checkbox:checked + label { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); transform: scale(1.1); }
    </style>
</head>
<body>
    <div id='sticker-app-container'>
        <div class='text-center mb-8'>
            <h2 class='text-3xl md:text-4xl font-black text-gray-800 flex items-center justify-center gap-2'>
                <i data-lucide='sticker' class='text-yellow-500 w-8 h-8'></i> Sticker Text Pro
            </h2>
            <p class='text-gray-500 mt-1 text-[10px] md:text-xs font-bold uppercase tracking-[0.2em]'>Pure Vector Export (SVG & PDF)</p>
        </div>

        <div class='grid grid-cols-1 lg:grid-cols-12 gap-6'>
            <div class='lg:col-span-4 xl:col-span-3 space-y-5 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit'>
                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Tulis Teks</label>
                    <input class='w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none text-base font-bold' id='textInput' type='text' value='Jericho'/>
                </div>

                <div class='space-y-3'>
                    <div>
                        <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider'>Pilih Font</label>
                        <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl text-sm font-bold' id='fontFamily'>
                            <option selected value='Lilita One'>Lilita One</option>
                            <option value='Sour Gummy'>Sour Gummy</option>
                            <option value='Luckiest Guy'>Luckiest Guy</option>
                            <option value='Fredoka'>Fredoka</option>
                            <option value='Bungee'>Bungee</option>
                        </select>
                    </div>
                    
                    <label for="fontUpload" class="custom-file-upload flex flex-col items-center justify-center p-4 gap-2 border-2">
                        <input type="file" id="fontUpload" accept=".ttf,.otf" class="hidden">
                        <i data-lucide="file-up" class="text-blue-500 w-6 h-6"></i>
                        <div class="text-center">
                            <span id="fontUploadLabel" class="text-[10px] font-black text-gray-500 uppercase block">Klik untuk Upload Font</span>
                            <span class="text-[8px] text-gray-400 italic">(.ttf atau .otf)</span>
                        </div>
                    </label>
                </div>

                <div class='grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100'>
                    <div class='space-y-2'>
                        <div class='flex justify-between items-center'>
                            <label class='text-[9px] font-black text-gray-400 uppercase'>Ukuran</label>
                            <input class='num-input' id='valFontSize' type='number' value='20' step="0.1"/>
                        </div>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer' id='fontSize' max='300' min='2' step="0.1" type='range' value='20'/>
                    </div>
                    <div class='space-y-2'>
                        <div class='flex justify-between items-center'>
                            <div class='flex items-center gap-1'>
                                <input checked class='w-3 h-3 accent-blue-600' id='outlineEnable' type='checkbox'/>
                                <label class='text-[9px] font-black text-gray-400 uppercase cursor-pointer' for='outlineEnable'>Outline</label>
                            </div>
                            <input class='num-input' id='valStrokeWidth' type='number' value='1.7' step="0.1"/>
                        </div>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer' id='strokeWidth' max='40' min='0' step='0.1' type='range' value='1.7'/>
                    </div>
                </div>

                <div class='flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100'>
                    <span class='text-[10px] font-black text-gray-700 uppercase'>Warna Outline</span>
                    <input class='w-7 h-7 rounded-md cursor-pointer border-2 border-white shadow-sm' id='outlineColor' type='color' value='#ffffff'/>
                </div>

                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-wider'>Profil Warna</label>
                    <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl text-xs font-bold mb-3' id='colorProfile'>
                        <option selected value='playful'>Playful</option>
                        <option value='bold'>Bold</option>
                        <option value='hitam'>Hitam</option>
                        <option value='biru'>Biru</option>
                        <option value='putih'>Putih</option>
                    </select>
                    <div class='grid grid-cols-5 gap-2' id='colorPalette'></div>
                </div>

                <div class='flex items-center justify-between bg-blue-50 p-3 rounded-xl border border-blue-100'>
                    <span class='text-[10px] font-black text-blue-700 uppercase'>Mode Satu Warna</span>
                    <label class='switch'>
                        <input id='singleColorMode' type='checkbox'/>
                        <span class='slider'></span>
                    </label>
                </div>
            </div>

            <div class='lg:col-span-8 xl:col-span-9 flex flex-col gap-4'>
                <div class='canvas-area flex-grow min-h-[500px] flex items-center justify-center relative bg-gray-50 border-4 border-white shadow-xl overflow-hidden'>
                    <canvas id='textCanvas'></canvas>
                </div>
                <div class='bg-white p-5 rounded-2xl flex flex-wrap justify-between items-center gap-4 border border-gray-100'>
                    <div class='flex items-center gap-2'>
                        <div class='w-2 h-2 bg-emerald-500 rounded-full animate-pulse'></div>
                        <p class='text-[11px] text-gray-500 font-bold uppercase tracking-widest' id='statusText'>Sistem siap.</p>
                    </div>
                    <div class="flex gap-2">
                        <button class='bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold text-xs transition-all active:scale-95' id='downloadSvgBtn'>SVG VEKTOR</button>
                        <button class='bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg font-bold text-xs transition-all active:scale-95' id='downloadPdfBtn'>PDF VEKTOR</button>
                        <button class='bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-black transition-all active:scale-95 shadow-lg shadow-blue-200' id='downloadBtn'>SIMPAN PNG</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('textCanvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('textInput');
        const fontFamily = document.getElementById('fontFamily');
        const fontUpload = document.getElementById('fontUpload');
        const fontUploadLabel = document.getElementById('fontUploadLabel');
        const fontSize = document.getElementById('fontSize');
        const valFontSize = document.getElementById('valFontSize');
        const strokeWidth = document.getElementById('strokeWidth');
        const valStrokeWidth = document.getElementById('valStrokeWidth');
        const outlineEnable = document.getElementById('outlineEnable');
        const outlineColor = document.getElementById('outlineColor');
        const colorProfile = document.getElementById('colorProfile');
        const colorPaletteContainer = document.getElementById('colorPalette');
        const singleColorMode = document.getElementById('singleColorMode');

        const profiles = {
            playful: ['#ED2224', '#3DB54A', '#F79421', '#2BAAE2'],
            bold: ['#749BB5', '#DF775B', '#EDBA65', '#FCCDBA', '#B7CCBB', '#E1863B'],
            hitam: ['#000000'],
            biru: ['#00509E'],
            putih: ['#FFFFFF']
        };

        let currentSelectedColors = [];

        function init() {
            lucide.createIcons();
            loadPalette('playful');
            setupEventListeners();
            document.fonts.ready.then(draw);
        }

        fontUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fontName = 'CustomFont_' + Date.now();
                const reader = new FileReader();
                reader.onload = function(event) {
                    const newFont = new FontFace(fontName, event.target.result);
                    newFont.load().then(function(loadedFont) {
                        document.fonts.add(loadedFont);
                        const option = document.createElement('option');
                        option.value = fontName;
                        option.text = "Kustom: " + file.name;
                        option.selected = true;
                        fontFamily.add(option);
                        fontUploadLabel.innerText = "Font Berhasil Dimuat!";
                        draw();
                    }).catch(err => alert("Gagal memuat font."));
                };
                reader.readAsArrayBuffer(file);
            }
        });

        function loadPalette(key) {
            colorPaletteContainer.innerHTML = '';
            profiles[key].forEach((color, i) => {
                const item = document.createElement('div');
                item.className = 'relative';
                item.innerHTML = `
                    <input type="checkbox" id="c-${i}" class="hidden color-checkbox" checked value="${color}"/>
                    <label for="c-${i}" class="block w-full h-8 rounded-lg cursor-pointer border-2 border-white shadow-sm transition-transform" style="background-color:${color}"></label>
                `;
                colorPaletteContainer.appendChild(item);
                item.querySelector('input').addEventListener('change', updateColorsAndDraw);
            });
            updateColorsAndDraw();
        }

        function updateColorsAndDraw() {
            const checked = colorPaletteContainer.querySelectorAll('.color-checkbox:checked');
            currentSelectedColors = Array.from(checked).map(cb => cb.value);
            if(currentSelectedColors.length === 0) currentSelectedColors = ['#333333'];
            draw();
        }

        // Fungsi rander utama yang bisa digunakan kembali
        function renderToTargetContext(targetCtx, targetCanvas) {
            const text = textInput.value || " ";
            const fSize = parseFloat(fontSize.value);
            const sWidth = parseFloat(strokeWidth.value);
            const x = targetCanvas.width / 2;
            const y = targetCanvas.height / 2;

            targetCtx.font = `900 ${fSize}px "${fontFamily.value}", sans-serif`;
            targetCtx.textBaseline = 'middle';
            targetCtx.textAlign = 'center';
            targetCtx.lineJoin = 'round';
            targetCtx.lineCap = 'round';

            if (outlineEnable.checked) {
                targetCtx.strokeStyle = outlineColor.value;
                targetCtx.lineWidth = sWidth * 2.5;
                targetCtx.strokeText(text, x, y);
            }

            const textMetrics = targetCtx.measureText(text);
            let currentX = x - (textMetrics.width / 2);
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const charWidth = targetCtx.measureText(char).width;
                targetCtx.fillStyle = singleColorMode.checked ? currentSelectedColors[0] : currentSelectedColors[i % currentSelectedColors.length];
                targetCtx.fillText(char, currentX + (charWidth / 2), y);
                currentX += charWidth;
            }
        }

        async function draw() {
            const text = textInput.value || " ";
            const fSize = parseFloat(fontSize.value);
            valFontSize.value = fontSize.value;
            valStrokeWidth.value = strokeWidth.value;

            ctx.font = `900 ${fSize}px "${fontFamily.value}", sans-serif`;
            const textMetrics = ctx.measureText(text);
            
            const padding = fSize * 0.7;
            canvas.width = textMetrics.width + padding;
            canvas.height = fSize * 2.2;

            renderToTargetContext(ctx, canvas);
        }

        // --- FUNGSI VEKTORISASI PERBAIKAN ---
        function generatePureSVG() {
            const text = textInput.value || " ";
            const fSize = parseFloat(fontSize.value);
            const sWidth = parseFloat(strokeWidth.value);
            const fFamily = fontFamily.value;

            const textMetrics = ctx.measureText(text);
            const width = textMetrics.width + (fSize * 0.7);
            const height = fSize * 2.2;
            const xCenter = width / 2;
            const yCenter = height / 2;

            // Gunakan &amp; agar URL valid dalam XML/SVG
            const fontUrl = "https://fonts.googleapis.com/css2?family=Fredoka:wght@700&amp;family=Luckiest+Guy&amp;family=Lilita+One&amp;family=Sour+Gummy:wght@900&amp;family=Bungee&amp;family=Quicksand:wght@700&amp;display=swap";

            let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;
            svgContent += `<style>@import url('${fontUrl}'); text { font-family: '${fFamily}', sans-serif; font-weight: 900; }</style>`;
            
            if (outlineEnable.checked) {
                svgContent += `<text x="${xCenter}" y="${yCenter}" text-anchor="middle" dominant-baseline="middle" 
                    font-size="${fSize}" fill="none" stroke="${outlineColor.value}" 
                    stroke-width="${sWidth * 2.5}" stroke-linejoin="round" stroke-linecap="round">${text}</text>`;
            }

            let currentX = xCenter - (textMetrics.width / 2);
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const charWidth = ctx.measureText(char).width;
                const color = singleColorMode.checked ? currentSelectedColors[0] : currentSelectedColors[i % currentSelectedColors.length];
                const safeChar = char.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

                svgContent += `<text x="${currentX + (charWidth / 2)}" y="${yCenter}" text-anchor="middle" 
                    dominant-baseline="middle" font-size="${fSize}" fill="${color}">${safeChar}</text>`;
                currentX += charWidth;
            }

            svgContent += `</svg>`;
            return svgContent;
        }

        function setupEventListeners() {
            [textInput, fontFamily, fontSize, strokeWidth, outlineEnable, outlineColor, singleColorMode].forEach(el => {
                el.addEventListener('input', draw);
            });
            [valFontSize, valStrokeWidth].forEach(el => {
                el.addEventListener('input', (e) => {
                    const targetId = e.target.id === 'valFontSize' ? 'fontSize' : 'strokeWidth';
                    document.getElementById(targetId).value = e.target.value;
                    draw();
                });
            });
            colorProfile.addEventListener('change', (e) => loadPalette(e.target.value));
            
            document.getElementById('downloadBtn').addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = `sticker-${textInput.value}-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            });

            document.getElementById('downloadSvgBtn').addEventListener('click', () => {
                const svgData = generatePureSVG();
                const blob = new Blob([svgData], {type: 'image/svg+xml'});
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `sticker-${textInput.value}-${Date.now()}.svg`;
                link.href = url;
                link.click();
            });

            document.getElementById('downloadPdfBtn').addEventListener('click', () => {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: canvas.width > canvas.height ? 'l' : 'p',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                });

                const scale = 4; // High DPI render untuk hasil tajam
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width * scale;
                tempCanvas.height = canvas.height * scale;
                const tCtx = tempCanvas.getContext('2d');
                tCtx.scale(scale, scale);
                
                renderToTargetContext(tCtx, canvas); 

                pdf.addImage(tempCanvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
                pdf.save(`sticker-${textInput.value}-${Date.now()}.pdf`);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
