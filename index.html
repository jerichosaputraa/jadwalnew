<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Text Generator - Pro</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Luckiest+Guy&family=Lilita+One&family=Sour+Gummy:wght@900&family=Bungee&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script>

    <style>
        /* Base UI Styles */
        body { background-color: #f3f4f6; }
        #sticker-app-container {
            font-family: 'Inter', sans-serif;
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }
        .canvas-area {
            background-image: 
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 24px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        .custom-file-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            cursor: pointer;
            background: #f9fafb;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            transition: all 0.2s;
            min-height: 60px;
        }
        .custom-file-upload:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .color-checkbox:checked + label {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
            transform: scale(1.05);
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
        .num-input {
            width: 50px;
            text-align: right;
            border: none;
            background: #f3f4f6;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            outline: none;
        }
        canvas { 
            display: block; 
            max-width: 100%; 
            height: auto;
        }
        .palette-item .remove-color { display: none; z-index: 10; }
        .palette-item:hover .remove-color { display: flex; }
    </style>
</head>

<body>
    <div id="sticker-app-container">
        <!-- Header -->
        <div class="text-center mb-8">
            <h2 class="text-3xl md:text-4xl font-black text-gray-800 flex items-center justify-center gap-2">
                <i class="text-yellow-500" data-lucide="sticker"></i> Sticker Text Pro
            </h2>
            <p class="text-gray-500 mt-1 text-[10px] md:text-xs font-bold uppercase tracking-[0.2em]">Vector PDF & SVG | Outlines & Multi-Color Ready</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Sidebar Panel -->
            <div class="lg:col-span-4 xl:col-span-3 space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider">Tulis Teks</label>
                    <input class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition-all text-base font-bold" id="textInput" placeholder="Ketik sesuatu..." type="text" value="Eriska"/>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider">Pilih Font</label>
                        <select class="w-full p-2.5 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition-all text-sm font-medium" id="fontFamily">
                            <option selected value="Lilita One">Lilita One (Classic)</option>
                            <option value="Sour Gummy">Sour Gummy (Round)</option>
                            <option value="Luckiest Guy">Luckiest Guy (Comic)</option>
                            <option value="Fredoka">Fredoka (Rounded)</option>
                            <option value="Bungee">Bungee (Blocky)</option>
                        </select>
                    </div>
                    <div>
                        <label class="custom-file-upload group" id="uploadContainer">
                            <input accept=".ttf,.otf" class="hidden" id="fontUpload" type="file"/>
                            <div class="flex flex-col items-center gap-1 text-center" id="uploadLabel">
                                <i class="text-blue-500" data-lucide="file-up"></i>
                                <span class="text-[9px] font-black text-gray-500 uppercase tracking-tighter">Upload Custom Font</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label class="text-[9px] font-black text-gray-400 uppercase">Ukuran</label>
                            <input class="num-input" id="valFontSize" type="number" value="20"/>
                        </div>
                        <input class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" id="fontSize" max="200" min="2" step="0.1" type="range" value="20"/>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-1">
                                <input checked class="w-3 h-3 accent-blue-600 cursor-pointer" id="outlineEnable" type="checkbox"/>
                                <label class="text-[9px] font-black text-gray-400 uppercase cursor-pointer" for="outlineEnable">Outline</label>
                            </div>
                            <input class="num-input" id="valStrokeWidth" type="number" value="1.7"/>
                        </div>
                        <input class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" id="strokeWidth" max="35" min="0" step="0.1" type="range" value="1.7"/>
                    </div>
                </div>

                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="text-[10px] font-black text-gray-700 uppercase">Warna Outline</span>
                    <input class="w-6 h-6 rounded-md border-0 cursor-pointer p-0 bg-transparent" id="outlineColor" type="color" value="#ffffff"/>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider">Profil Warna</label>
                    <select class="w-full p-2.5 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition-all text-xs font-bold" id="colorProfile">
                        <option selected value="vintage">Vintage Soft</option>
                        <option value="playful">Playful (Ceria)</option>
                        <option value="bold">Bold</option>
                        <option value="neon">Electric Neon</option>
                        <option value="solid">Solid Colors</option>
                        <option value="custom">Custom Profile</option>
                    </select>
                </div>

                <div class="flex items-center justify-between bg-blue-50/50 p-3 rounded-xl border border-blue-100">
                    <span class="text-[10px] font-black text-blue-700 uppercase">Mode Satu Warna</span>
                    <label class="switch">
                        <input id="singleColorMode" type="checkbox"/>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="space-y-2">
                    <div id="colorPalette" class="grid grid-cols-5 gap-2"></div>
                </div>
            </div>

            <!-- Preview Area -->
            <div class="lg:col-span-8 xl:col-span-9 flex flex-col gap-4">
                <div class="canvas-area flex-grow min-h-[400px] flex items-center justify-center bg-gray-50 p-6 overflow-hidden border-4 border-white shadow-xl relative">
                    <canvas id="textCanvas" class="drop-shadow-2xl"></canvas>
                </div>
                
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                    <p class="text-[10px] text-gray-400 font-mono" id="statusText">Sistem siap.</p>
                    <div class="flex gap-2">
                        <button class="bg-blue-600 text-white px-6 py-2 rounded-xl font-black text-[11px]" id="downloadBtn">SIMPAN PNG</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Logika JavaScript kamu tetap sama, taruh di sini.
        // Pastikan variabel 'canvas', 'ctx', dll sudah di-assign dengan benar.
        
        const canvas = document.getElementById('textCanvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('textInput');
        // ... (lanjutkan copy paste sisa logic script kamu di sini)
        
        // Inisialisasi icon Lucide
        lucide.createIcons();

        // Contoh sederhana fungsi draw
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = `bold 60px ${document.getElementById('fontFamily').value}`;
            ctx.fillStyle = "black";
            ctx.textAlign = "center";
            ctx.fillText(textInput.value, canvas.width/2, canvas.height/2);
        }

        textInput.addEventListener('input', draw);
        document.getElementById('fontFamily').addEventListener('change', draw);
        
        // Atur ukuran canvas default
        canvas.width = 800;
        canvas.height = 400;
        draw();
    </script>
</body>
</html>
