<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta content='width=device-width, initial-scale=1' name='viewport'/>
    <title>Sticker Text Pro - Font Upload Fixed</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Luckiest+Guy&family=Lilita+One&family=Sour+Gummy:wght@900&family=Bungee&display=swap' rel='stylesheet'/>
    <script src='https://unpkg.com/lucide@latest'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js'></script>

    <style>
        #sticker-app-container { font-family: 'Inter', sans-serif; max-width: 1280px; margin: 0 auto; background: #f3f4f6; padding: 20px; } [cite: 2]
        .canvas-area { background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%); background-size: 20px 20px; border-radius: 24px; } [cite: 4, 5, 6]
        .custom-file-upload { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; cursor: pointer; background: #f9fafb; border: 2px dashed #d1d5db; border-radius: 12px; min-height: 60px; } [cite: 7, 8, 9]
        canvas { display: block; max-width: 100%; height: auto; } [cite: 31]
    </style>
</head>
<body class="bg-gray-100">
    <div id='sticker-app-container'>
        <div class='grid grid-cols-1 lg:grid-cols-12 gap-6'>
            <div class='lg:col-span-4 xl:col-span-3 space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-gray-100'>
                <div>
                    <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase'>Tulis Teks</label>
                    <input class='w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none font-bold' id='textInput' type='text' value='Jericho'/> [cite: 36]
                </div>

                <div class='space-y-3'>
                    <div>
                        <label class='block text-[10px] font-black text-gray-400 mb-1 uppercase'>Pilih Font</label>
                        <select class='w-full p-2.5 border-2 border-gray-100 rounded-xl text-sm font-medium' id='fontFamily'> [cite: 38]
                            <option value='Lilita One'>Lilita One</option>
                            <option value='Sour Gummy' selected>Sour Gummy</option>
                            <option value='Luckiest Guy'>Luckiest Guy</option>
                        </select>
                    </div>
                    
                    <label class='custom-file-upload group' id='uploadContainer'>
                        <input accept='.ttf,.otf' class='hidden' id='fontUpload' type='file'/> [cite: 41]
                        <div class='flex flex-col items-center gap-1 text-center' id='uploadLabel'>
                            <i class='text-blue-500' data-lucide='file-up'></i> [cite: 42]
                            <span class='text-[9px] font-black text-gray-500 uppercase'>Upload Font (.ttf / .otf)</span>
                        </div>
                    </label>
                </div>

                <div class='grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100'>
                    <div class='space-y-2'>
                        <label class='text-[9px] font-black text-gray-400 uppercase'>Ukuran</label>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer' id='fontSize' max='200' min='10' step='1' type='range' value='30'/> [cite: 45]
                    </div>
                    <div class='space-y-2'>
                        <label class='text-[9px] font-black text-gray-400 uppercase'>Outline</label>
                        <input class='w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer' id='strokeWidth' max='20' min='0' step='0.1' type='range' value='2'/> [cite: 48]
                    </div>
                </div>

                <div class='grid grid-cols-5 gap-2' id='colorPalette'></div> [cite: 59]
            </div>

            <div class='lg:col-span-8 xl:col-span-9 flex flex-col gap-4'>
                <div class='canvas-area flex-grow min-h-[450px] flex items-center justify-center relative bg-gray-50 border-4 border-white shadow-xl'>
                    <canvas id='textCanvas'></canvas> [cite: 68]
                </div>
                <div class='bg-white p-4 rounded-2xl flex justify-between items-center border border-gray-100'>
                    <p class='text-[10px] text-gray-400 font-mono italic' id='statusText'>Sistem siap.</p> [cite: 71]
                    <button class='bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black' id='downloadBtn'>SIMPAN PNG</button> [cite: 74]
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('textCanvas'), ctx = canvas.getContext('2d'); [cite: 76, 77]
            const textInput = document.getElementById('textInput'), fontFamily = document.getElementById('fontFamily');
            const fontUpload = document.getElementById('fontUpload'), uploadLabel = document.getElementById('uploadLabel');
            const fontSize = document.getElementById('fontSize'), strokeWidth = document.getElementById('strokeWidth');
            const colorPaletteContainer = document.getElementById('colorPalette'), statusText = document.getElementById('statusText');

            let currentOpentypeFont = null; 
            const palette = ['#ff0000', '#2baae2', '#3db54a', '#f79421', '#df775b']; [cite: 82]

            // --- PERBAIKAN FITUR UPLOAD FONT ---
            fontUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return; [cite: 129]

                const reader = new FileReader();
                reader.readAsArrayBuffer(file); [cite: 142]
                
                reader.onload = async function(event) {
                    try {
                        const fontBuffer = event.target.result;
                        
                        // 1. Parsing untuk Opentype.js (untuk ekspor SVG/PDF nanti)
                        currentOpentypeFont = opentype.parse(fontBuffer); [cite: 138]
                        
                        // 2. Registrasi Font ke Browser (untuk Canvas Preview)
                        const fontName = 'CustomFont_' + Date.now();
                        const fontFace = new FontFace(fontName, fontBuffer); [cite: 138]
                        
                        statusText.innerText = "Memuat font...";
                        
                        const loadedFace = await fontFace.load(); [cite: 139]
                        document.fonts.add(loadedFace); [cite: 139]
                        
                        // Tambahkan ke dropdown dan pilih otomatis
                        const newOption = document.createElement('option'); [cite: 139]
                        newOption.value = fontName;
                        newOption.text = "Kustom: " + file.name; [cite: 140]
                        fontFamily.add(newOption);
                        fontFamily.value = fontName; [cite: 140]

                        // Beri feedback visual
                        uploadLabel.innerHTML = `<i data-lucide="check-circle-2" class="text-green-500"></i><span class="text-green-600 font-black text-[9px] uppercase">Berhasil</span>`; [cite: 140]
                        lucide.createIcons(); [cite: 141]
                        statusText.innerText = "Font aktif: " + file.name;
                        
                        draw(); // Render ulang
                    } catch (err) {
                        console.error(err);
                        statusText.innerText = "Gagal memproses file font."; [cite: 141]
                    }
                };
            });

            function initPalette() {
                colorPaletteContainer.innerHTML = '';
                palette.forEach((color, i) => {
                    const div = document.createElement('div');
                    div.innerHTML = `<input type="checkbox" id="c-${i}" class="hidden color-checkbox" checked value="${color}"/>
                                     <label for="c-${i}" class="block w-full h-8 rounded-lg cursor-pointer border-2 border-white" style="background-color:${color}"></label>`;
                    colorPaletteContainer.appendChild(div);
                    div.querySelector('input').addEventListener('change', draw);
                });
            }

            async function draw() {
                const text = textInput.value || " "; [cite: 143]
                const size = parseFloat(fontSize.value);
                const sWidth = parseFloat(strokeWidth.value);
                const activeFont = fontFamily.value;

                // Tunggu font siap di sistem sebelum menggambar
                await document.fonts.load(`${size}px "${activeFont}"`); [cite: 145]

                ctx.font = `900 ${size}px "${activeFont}", sans-serif`; [cite: 145]
                const m = ctx.measureText(text);
                canvas.width = m.width + (size * 1.5); [cite: 146]
                canvas.height = size * 3; [cite: 146]

                ctx.font = `900 ${size}px "${activeFont}", sans-serif`; [cite: 146]
                ctx.textBaseline = 'middle'; [cite: 146]
                ctx.textAlign = 'center'; [cite: 147]
                ctx.lineJoin = 'round'; [cite: 147]

                const x = canvas.width / 2, y = canvas.height / 2;
                let curX = (canvas.width - m.width) / 2;

                // Draw Outline
                if (sWidth > 0) {
                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = sWidth * 2.5; [cite: 149]
                    let ox = curX;
                    for (let char of text) {
                        const cw = ctx.measureText(char).width;
                        ctx.strokeText(char, ox + cw/2, y); [cite: 150]
                        ox += cw;
                    }
                }

                // Draw Fill
                const checkboxes = colorPaletteContainer.querySelectorAll('.color-checkbox:checked');
                const colors = Array.from(checkboxes).map(cb => cb.value);
                let fx = curX;
                for (let i = 0; i < text.length; i++) {
                    const cw = ctx.measureText(text[i]).width;
                    ctx.fillStyle = colors[i % colors.length] || '#000000'; [cite: 152]
                    ctx.fillText(text[i], fx + cw/2, y); [cite: 152]
                    fx += cw;
                }
            }

            textInput.addEventListener('input', draw); [cite: 162]
            fontFamily.addEventListener('change', draw); [cite: 163]
            fontSize.addEventListener('input', draw); [cite: 163]
            strokeWidth.addEventListener('input', draw); [cite: 163]

            window.onload = () => { initPalette(); lucide.createIcons(); draw(); }; [cite: 193]
        })();
    </script>
</body>
</html>
