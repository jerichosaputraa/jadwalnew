<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Text Generator - Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Luckiest+Guy&family=Lilita+One&family=Sour+Gummy:wght@900&family=Bungee&family=Quicksand:wght@700&display=swap" rel="stylesheet"/>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Quicksand', sans-serif; }
        #sticker-app-container { max-width: 1280px; margin: 0 auto; padding: 20px; }
        .canvas-area { 
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 24px;
        }
        .custom-file-upload { cursor: pointer; transition: all 0.2s; border: 2px dashed #d1d5db; }
        .custom-file-upload:hover { border-color: #3b82f6; background: #eff6ff; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
        .num-input { width: 55px; text-align: right; background: #f3f4f6; padding: 2px 4px; border-radius: 4px; font-size: 11px; font-weight: bold; outline: none; }
        .color-checkbox:checked + label { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="sticker-app-container">
        <div class="text-center mb-8">
            <h2 class="text-3xl md:text-4xl font-black text-gray-800 flex items-center justify-center gap-2">
                <i data-lucide="sticker" class="text-yellow-500 w-8 h-8"></i> Sticker Text Pro
            </h2>
            <p class="text-gray-500 mt-1 text-[10px] md:text-xs font-bold uppercase tracking-[0.2em]">High Resolution PNG Export</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 xl:col-span-3 space-y-5 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider">Tulis Teks</label>
                    <input class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none text-base font-bold" id="textInput" type="text" value="Jericho"/>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-wider">Pilih Font</label>
                    <select class="w-full p-2.5 border-2 border-gray-100 rounded-xl text-sm font-bold" id="fontFamily">
                        <option selected value="Lilita One">Lilita One</option>
                        <option value="Sour Gummy">Sour Gummy</option>
                        <option value="Luckiest Guy">Luckiest Guy</option>
                        <option value="Fredoka">Fredoka</option>
                        <option value="Bungee">Bungee</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label class="text-[9px] font-black text-gray-400 uppercase">Ukuran</label>
                            <input class="num-input" id="valFontSize" type="number" value="80"/>
                        </div>
                        <input class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer" id="fontSize" max="300" min="20" type="range" value="80"/>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-1">
                                <input checked class="w-3 h-3 accent-blue-600" id="outlineEnable" type="checkbox"/>
                                <label class="text-[9px] font-black text-gray-400 uppercase cursor-pointer" for="outlineEnable">Outline</label>
                            </div>
                            <input class="num-input" id="valStrokeWidth" type="number" value="6"/>
                        </div>
                        <input class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer" id="strokeWidth" max="40" min="0" step="0.5" type="range" value="6"/>
                    </div>
                </div>

                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="text-[10px] font-black text-gray-700 uppercase">Warna Outline</span>
                    <input class="w-7 h-7 rounded-md cursor-pointer border-2 border-white shadow-sm" id="outlineColor" type="color" value="#ffffff"/>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-wider">Profil Warna</label>
                    <select class="w-full p-2.5 border-2 border-gray-100 rounded-xl text-xs font-bold mb-3" id="colorProfile">
                        <option value="vintage">Vintage Soft</option>
                        <option selected value="playful">Playful Bright</option>
                        <option value="pastel">Sweet Pastel</option>
                        <option value="neon">Electric Neon</option>
                        <option value="earth">Earth Tones</option>
                        <option value="monochrome">Luxury Dark</option>
                    </select>
                    <div class="grid grid-cols-5 gap-2" id="colorPalette"></div>
                </div>

                <div class="flex items-center justify-between bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <span class="text-[10px] font-black text-blue-700 uppercase">Mode Satu Warna</span>
                    <label class="switch">
                        <input id="singleColorMode" type="checkbox"/>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="lg:col-span-8 xl:col-span-9 flex flex-col gap-4">
                <div class="canvas-area flex-grow min-h-[500px] flex items-center justify-center relative bg-gray-50 border-4 border-white shadow-xl overflow-hidden">
                    <canvas id="textCanvas"></canvas>
                </div>
                <div class="bg-white p-5 rounded-2xl flex flex-wrap justify-between items-center gap-4 border border-gray-100">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <p class="text-[11px] text-gray-500 font-bold uppercase tracking-widest" id="statusText">Sistem siap.</p>
                    </div>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-black transition-all active:scale-95 shadow-lg shadow-blue-200" id="downloadBtn">SIMPAN PNG</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('textCanvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('textInput');
        const fontFamily = document.getElementById('fontFamily');
        const fontSize = document.getElementById('fontSize');
        const valFontSize = document.getElementById('valFontSize');
        const strokeWidth = document.getElementById('strokeWidth');
        const valStrokeWidth = document.getElementById('valStrokeWidth');
        const outlineEnable = document.getElementById('outlineEnable');
        const outlineColor = document.getElementById('outlineColor');
        const colorProfile = document.getElementById('colorProfile');
        const colorPaletteContainer = document.getElementById('colorPalette');
        const singleColorMode = document.getElementById('singleColorMode');

        // Palet warna lengkap
        const profiles = {
            vintage: ['#84a5ba', '#d87459', '#e9c465', '#f8c5af', '#a7c1ae'],
            playful: ['#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4C93'],
            pastel: ['#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA'],
            neon: ['#39FF14', '#FF00FF', '#00FFFF', '#FFFF00', '#FF3131'],
            earth: ['#6B705C', '#A5A58D', '#B7B7A4', '#FFE8D6', '#DDBEA9'],
            monochrome: ['#2B2D42', '#8D99AE', '#EDF2F4', '#EF233C', '#D90429']
        };

        let currentSelectedColors = [];

        function init() {
            lucide.createIcons();
            loadPalette('playful');
            setupEventListeners();
            document.fonts.ready.then(draw);
        }

        function loadPalette(key) {
            colorPaletteContainer.innerHTML = '';
            profiles[key].forEach((color, i) => {
                const item = document.createElement('div');
                item.className = 'relative';
                item.innerHTML = `
                    <input type="checkbox" id="c-${i}" class="hidden color-checkbox" checked value="${color}"/>
                    <label for="c-${i}" class="block w-full h-8 rounded-lg cursor-pointer border-2 border-white shadow-sm transition-transform" style="background-color:${color}"></label>
                `;
                colorPaletteContainer.appendChild(item);
                item.querySelector('input').addEventListener('change', updateColorsAndDraw);
            });
            updateColorsAndDraw();
        }

        function updateColorsAndDraw() {
            const checked = colorPaletteContainer.querySelectorAll('.color-checkbox:checked');
            currentSelectedColors = Array.from(checked).map(cb => cb.value);
            if(currentSelectedColors.length === 0) currentSelectedColors = ['#333333'];
            draw();
        }

        async function draw() {
            const text = textInput.value || " ";
            const fSize = parseInt(fontSize.value);
            const sWidth = parseFloat(strokeWidth.value);
            
            valFontSize.value = fontSize.value;
            valStrokeWidth.value = strokeWidth.value;

            ctx.font = `900 ${fSize}px "${fontFamily.value}", sans-serif`;
            const textMetrics = ctx.measureText(text);
            
            // Padding untuk outline agar tidak terpotong
            const padding = fSize * 0.5;
            canvas.width = textMetrics.width + padding;
            canvas.height = fSize * 1.8;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            const x = canvas.width / 2;
            const y = canvas.height / 2;

            // Render Outline
            if (outlineEnable.checked) {
                ctx.font = `900 ${fSize}px "${fontFamily.value}", sans-serif`;
                ctx.strokeStyle = outlineColor.value;
                ctx.lineWidth = sWidth * 2.5;
                ctx.strokeText(text, x, y);
            }

            // Render Multi-color Text
            let currentX = x - (textMetrics.width / 2);
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const charWidth = ctx.measureText(char).width;
                
                ctx.fillStyle = singleColorMode.checked ? currentSelectedColors[0] : currentSelectedColors[i % currentSelectedColors.length];
                ctx.fillText(char, currentX + (charWidth / 2), y);
                currentX += charWidth;
            }
        }

        function setupEventListeners() {
            [textInput, fontFamily, fontSize, strokeWidth, outlineEnable, outlineColor, singleColorMode].forEach(el => {
                el.addEventListener('input', draw);
            });
            
            colorProfile.addEventListener('change', (e) => loadPalette(e.target.value));

            document.getElementById('downloadBtn').addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = `sticker-${textInput.value}-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
